# Reusable workflow for running tests
on:
  workflow_call:

permissions:
  contents: read

jobs:
  lint-frontend:
    name: Frontend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
      - name: Install Node modules
        working-directory: web
        run: npm ci
      - name: Run linting
        working-directory: web
        run: npm run test
